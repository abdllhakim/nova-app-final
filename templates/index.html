<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Website - Studio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #0c0d19 0%, #030305 100%);
            color: #fff;
            min-height: 100vh;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 30px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
        }

        .app-title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(90deg, #00f0ff, #6a5cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .header-actions a {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 9px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-left: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .logout-btn {
            color: #ff6b6b !important;
            border-color: rgba(239, 68, 68, 0.3) !important;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .prompt-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.12);
            border-radius: 18px;
            padding: 30px;
            margin-bottom: 25px;
        }

        .prompt-box h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #00f0ff;
        }

        textarea,
        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            padding: 14px;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        textarea:focus,
        input[type="text"]:focus {
            border-color: #00f0ff;
        }

        .generate-btn {
            background: linear-gradient(90deg, #00f0ff, #6a5cff);
            color: #04040a;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tabs button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
        }

        .tabs button.active {
            background: linear-gradient(90deg, #00f0ff, #6a5cff);
            color: #04040a;
            font-weight: 700;
        }

        .result-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            overflow: hidden;
            min-height: 500px;
        }

        .result-toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 12px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .result-toolbar button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
        }

        .build-btn {
            background: linear-gradient(90deg, #00f0ff, #6a5cff) !important;
            color: #04040a !important;
            font-weight: 700 !important;
            border: none !important;
        }

        #previewFrame {
            width: 100%;
            height: 500px;
            border: none;
            background: #fff;
            display: block;
        }

        #sourceCode {
            width: 100%;
            height: 500px;
            background: #0a0a12;
            color: #9effb0;
            font-family: monospace;
            font-size: 12px;
            padding: 20px;
            overflow: auto;
            white-space: pre-wrap;
            display: none;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: #0c0d19;
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-box h3 {
            font-size: 22px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00f0ff, #6a5cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-box p {
            color: #8a8fa3;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .pay-btn {
            background: linear-gradient(90deg, #00f0ff, #6a5cff);
            color: #04040a;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #8a8fa3;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            width: 100%;
        }
    </style>
</head>

<body>

    <header>
        <div class="app-title">NOVA WEBSITE</div>
        <div class="header-actions">
            <a href="/logout" class="logout-btn">تسجيل الخروج</a>
        </div>
    </header>

    <div class="container">
        <div class="prompt-box">
            <h2>✨ صف الموقع اللي بغيتي نصاوبلك</h2>
            <textarea id="sitePrompt" rows="3"
                placeholder="مثال: موقع لبيع الملابس بستايل عصري وألوان دارقة..."></textarea>
            <input type="text" id="styleContext"
                placeholder="ستايل/ألوان مفضلة (اختياري) — مثال: dark, minimal, blue accents">
            <button class="generate-btn" onclick="generateSite()">🚀 صاوب الموقع</button>
        </div>

        <div class="tabs">
            <button id="previewTab" class="active" onclick="showTab('preview')">Live Preview</button>
            <button id="sourceTab" onclick="showTab('source')">Source Code</button>
        </div>

        <div class="result-box">
            <div class="result-toolbar">
                <button onclick="copyCode()">📋 Copy Code — $5</button>
                <button class="build-btn" onclick="showPayModal()">🚀 Build Live Site — $5</button>
            </div>
            <iframe id="previewFrame"
                srcdoc="<body style='display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#888;'>الموقع ديالك غادي يبان هنا بعد التوليد ✨</body>"></iframe>
            <pre id="sourceCode"></pre>
        </div>
    </div>

    <div class="modal-overlay" id="payModal">
        <div class="modal-box">
            <h3>🚀 احصل على الكود الكامل</h3>
            <p>دفعة واحدة فقط — <strong style="color:#00f0ff;">$5.00</strong><br>تحمل الموقع أو تنسخ الكود جاهز للنشر
            </p>
            <button class="pay-btn" onclick="buildLiveSite()">💳 ادفع بـ PayPal</button>
            <button class="cancel-btn" onclick="closePayModal()">إلغاء</button>
        </div>
    </div>

    <script>
        let generatedHTML = "";

        function showTab(tab) {
            document.getElementById('previewFrame').style.display = tab === 'preview' ? 'block' : 'none';
            document.getElementById('sourceCode').style.display = tab === 'source' ? 'block' : 'none';
            document.getElementById('previewTab').classList.toggle('active', tab === 'preview');
            document.getElementById('sourceTab').classList.toggle('active', tab === 'source');
        }

        async function generateSite() {
            const prompt = document.getElementById('sitePrompt').value.trim();
            const context = document.getElementById('styleContext').value.trim();
            if (!prompt) { alert("كتب وصف للموقع أولا"); return; }

            document.getElementById('previewFrame').srcdoc = "<body style='display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#888;'>⏳ Nova كتصاوب الموقع ديالك...</body>";

            try {
                const res = await fetch('/ask-nova', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, context })
                });
                const data = await res.json();
                generatedHTML = data.generated_html;
                document.getElementById('previewFrame').srcdoc = generatedHTML;
                document.getElementById('sourceCode').textContent = generatedHTML;
            } catch (err) {
                document.getElementById('previewFrame').srcdoc = "<body style='color:red;text-align:center;padding:40px;'>❌ خطأ فالاتصال، حاول مرة أخرى</body>";
            }
        }

        function copyCode() {
            if (!generatedHTML) { alert("صاوب موقع أولا"); return; }
            showPayModal();
        }

        function showPayModal() {
            if (!generatedHTML) { alert("صاوب موقع أولا قبل البناء"); return; }
            document.getElementById('payModal').classList.add('active');
        }

        function closePayModal() {
            document.getElementById('payModal').classList.remove('active');
        }

        async function buildLiveSite() {
            try {
                const res = await fetch('/build-live-site', { method: 'POST' });
                const data = await res.json();
                if (data.redirect_url) {
                    window.location.href = data.redirect_url;
                } else {
                    alert("❌ خطأ: " + (data.error || "حاول مرة أخرى"));
                }
            } catch (err) {
                alert("❌ خطأ فالاتصال، حاول مرة أخرى");
            }
        }
    </script>

</body>

</html>
